name: MediaFusion CI/CD

on:
  release:
    types: [ created ]

# Least-privilege default; individual jobs override where write is required.
permissions:
  contents: read

jobs:
  update_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      previous_version: ${{ steps.extract_versions.outputs.PREVIOUS_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract versions
        id: extract_versions
        run: |
          BODY=$(cat << 'EOF'
          ${{ github.event.release.body }}
          EOF
          )
          if ! PREVIOUS_VERSION=$(echo "$BODY" | grep -o '/compare/.*\.\.\.' | sed 's/\/compare\///' | sed 's/\.\.\.//' || true); then
            echo "Error: Failed to extract previous version from release body"
            exit 1
          fi
          echo "PREVIOUS_VERSION=${PREVIOUS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install uv
        if: "!github.event.release.prerelease"
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        if: "!github.event.release.prerelease"
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Update version numbers
        if: "!github.event.release.prerelease"
        run: |
          make update-version VERSION_NEW=${{  github.ref_name }}

      - name: Commit and push version updates
        if: "!github.event.release.prerelease"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update version to ${{ github.ref_name }}"
          git push origin HEAD:main

  rust-build:
    name: Build Rust Binaries (${{ matrix.docker_arch }})
    needs: update_version
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            docker_arch: amd64
            musl_target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            docker_arch: arm64
            musl_target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.musl_target }}

      - name: Install Zig (for cargo-zigbuild)
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: backend

      - name: Build static binaries (musl)
        run: |
          cd backend
          cargo zigbuild --release \
            --target ${{ matrix.musl_target }} \
            --bin mediafusion-api \
            --bin mediafusion-worker

      - name: Stage artifacts
        run: |
          ARCH=${{ matrix.docker_arch }}
          TARGET=${{ matrix.musl_target }}
          mkdir -p dist
          cp backend/target/$TARGET/release/mediafusion-api    dist/mediafusion-api-linux-$ARCH
          cp backend/target/$TARGET/release/mediafusion-worker dist/mediafusion-worker-linux-$ARCH
          chmod +x dist/*

      - name: Upload binaries artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rust-dist-${{ matrix.docker_arch }}
          path: dist/
          retention-days: 1

  upload_release_assets:
    name: Upload Binary Release Assets
    needs: rust-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download amd64 binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rust-dist-amd64
          path: dist/

      - name: Download arm64 binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rust-dist-arm64
          path: dist/

      - name: Upload binaries to GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

  mediafusion_docker_build:
    needs: [update_version, rust-build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Download amd64 binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rust-dist-amd64
          path: rust-dist/amd64/

      - name: Download arm64 binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rust-dist-arm64
          path: rust-dist/arm64/

      - name: Rename artifacts to match Dockerfile expectations
        run: |
          mv rust-dist/amd64/mediafusion-api-linux-amd64    rust-dist/amd64/mediafusion-api
          mv rust-dist/amd64/mediafusion-worker-linux-amd64 rust-dist/amd64/mediafusion-worker
          mv rust-dist/arm64/mediafusion-api-linux-arm64    rust-dist/arm64/mediafusion-api
          mv rust-dist/arm64/mediafusion-worker-linux-arm64 rust-dist/arm64/mediafusion-worker
          chmod +x rust-dist/amd64/* rust-dist/arm64/*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: docker_build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          file: ./deployment/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=mediafusion
          cache-to: type=gha,mode=max,scope=mediafusion
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            mhdzumair/mediafusion:${{ github.ref_name }}
            mhdzumair/mediafusion:${{ contains(github.ref_name, 'beta') && 'beta' || 'latest' }}

      - name: Image digest
        run: echo "${{ steps.docker_build.outputs.digest }}"

  kodi_build:
    needs: update_version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Install required packages
        run: sudo apt-get install -y zip xmlstarlet

      - name: Build addon and repository
        run: |
          make -C clients/kodi
          for file in clients/kodi/dist/plugin.video.mediafusion/plugin.video.mediafusion-*.zip clients/kodi/dist/repository.mediafusion/repository.mediafusion-*.zip; do
            if [ ! -f "$file" ]; then
              echo "Error: Build artifact $file not found"
              exit 1
            fi
          done

      - name: Deploy to GitHub Pages
        if: "!github.event.release.prerelease"
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: clients/kodi/dist
          enable_jekyll: false
          force_orphan: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            clients/kodi/dist/plugin.video.mediafusion/plugin.video.mediafusion-*.zip
          token: ${{ secrets.GITHUB_TOKEN }}

  generate_release_notes:
    needs: update_version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate Release Notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          make generate-notes VERSION_OLD=${{ needs.update_version.outputs.previous_version }} VERSION_NEW=${{ github.ref_name }} > release_notes.md

      - name: Update Release Notes
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: release_notes.md
          token: ${{ secrets.GITHUB_TOKEN }}
