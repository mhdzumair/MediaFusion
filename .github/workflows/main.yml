name: MediaFusion CI/CD

on:
  release:
    types: [ created ]

# Least-privilege default; individual jobs override where write is required.
permissions:
  contents: read

# github.ref_name is empty on workflow re-runs; tag_name is always populated.
env:
  RELEASE_VERSION: ${{ github.event.release.tag_name }}

jobs:
  update_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      previous_version: ${{ steps.extract_versions.outputs.PREVIOUS_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract versions
        id: extract_versions
        run: |
          BODY=$(cat << 'EOF'
          ${{ github.event.release.body }}
          EOF
          )
          if ! PREVIOUS_VERSION=$(echo "$BODY" | grep -o '/compare/.*\.\.\.' | sed 's/\/compare\///' | sed 's/\.\.\.//' || true); then
            echo "Error: Failed to extract previous version from release body"
            exit 1
          fi
          echo "PREVIOUS_VERSION=${PREVIOUS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install uv
        if: "!github.event.release.prerelease"
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        if: "!github.event.release.prerelease"
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        if: "!github.event.release.prerelease"
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Update version numbers
        if: "!github.event.release.prerelease"
        run: |
          make update-version VERSION_NEW=${{ env.RELEASE_VERSION }}
          # Sync Cargo.lock with the bumped Cargo.toml version
          cargo update --workspace --manifest-path backend/Cargo.toml

      - name: Commit and push version updates
        if: "!github.event.release.prerelease"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update version to ${{ env.RELEASE_VERSION }}"
          git push origin HEAD:main

  rust-build:
    name: Build Rust Binaries (${{ matrix.label }})
    needs: update_version
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux-amd64
            platform: linux
            arch: amd64
            rust_target: x86_64-unknown-linux-gnu
            zig_target: x86_64-unknown-linux-gnu.2.39
            exe_suffix: ""
            use_zigbuild: true
            jemalloc: true
            tls_features: "tls-native,vendored-openssl"
            nsfw: true
            openssl_include_dir: /usr/include
            openssl_lib_dir: /usr/lib/x86_64-linux-gnu

          - runner: ubuntu-24.04-arm
            label: linux-arm64
            platform: linux
            arch: arm64
            rust_target: aarch64-unknown-linux-gnu
            zig_target: aarch64-unknown-linux-gnu
            exe_suffix: ""
            use_zigbuild: false  # native ARM64 runner — Ubuntu 24.04 = glibc 2.39, system OpenSSL headers available
            jemalloc: true
            tls_features: "tls-native"
            nsfw: true
            openssl_include_dir: /usr/include/aarch64-linux-gnu
            openssl_lib_dir: /usr/lib/aarch64-linux-gnu

          # macOS builds disabled — low usage (~32 downloads total across all releases).
          # ort has no prebuilt for Intel Mac (x86-64); arm64 usage too low to justify CI cost.
          # To re-enable: uncomment the entries below.
          # - runner: macos-14
          #   label: macos-amd64
          #   platform: macos
          #   arch: amd64
          #   rust_target: x86_64-apple-darwin
          #   zig_target: x86_64-apple-darwin
          #   exe_suffix: ""
          #   use_zigbuild: false
          #   jemalloc: true
          #   tls_features: "tls-native"
          #   nsfw: false
          # - runner: macos-14
          #   label: macos-arm64
          #   platform: macos
          #   arch: arm64
          #   rust_target: aarch64-apple-darwin
          #   zig_target: aarch64-apple-darwin
          #   exe_suffix: ""
          #   use_zigbuild: false
          #   jemalloc: true
          #   tls_features: "tls-native"
          #   nsfw: true
          - runner: ubuntu-24.04
            label: windows-amd64
            platform: windows
            arch: amd64
            rust_target: x86_64-pc-windows-gnu
            zig_target: x86_64-pc-windows-gnu
            exe_suffix: ".exe"
            use_zigbuild: true
            jemalloc: false
            tls_features: "tls-rustls"
            nsfw: false
            openssl_include_dir: ""
            openssl_lib_dir: ""

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Zig (for cargo-zigbuild)
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Fix OpenSSL multiarch headers for zig cross-compiler
        if: matrix.use_zigbuild && matrix.platform == 'linux'
        run: |
          # Ubuntu 24.04 puts opensslconf.h in a multiarch dir; zig's C compiler
          # only searches /usr/include, so symlink the missing file there.
          sudo ln -sf /usr/include/x86_64-linux-gnu/openssl/opensslconf.h \
                      /usr/include/openssl/opensslconf.h

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: backend

      - name: Build release binaries (cross-compile)
        if: matrix.use_zigbuild
        env:
          # Cross-compiling for apple-darwin via zig cannot compile aws-lc-sys
          # jitterentropy (needs CoreServices.h). Fall back to other entropy sources.
          AWS_LC_SYS_NO_JITTER_ENTROPY: "1"
          SQLX_OFFLINE: "true"
        run: |
          cd backend
          [ -n "${{ matrix.openssl_include_dir }}" ] && export OPENSSL_INCLUDE_DIR="${{ matrix.openssl_include_dir }}"
          [ -n "${{ matrix.openssl_lib_dir }}" ] && export OPENSSL_LIB_DIR="${{ matrix.openssl_lib_dir }}"
          FEATURES="${{ matrix.tls_features }}"
          if [ "${{ matrix.nsfw }}" = "true" ]; then
            FEATURES="$FEATURES,nsfw-classifier"
          fi
          if [ "${{ matrix.jemalloc }}" != "true" ]; then
            FEATURE_FLAGS="--no-default-features --features $FEATURES"
          else
            FEATURE_FLAGS="--features $FEATURES"
          fi
          cargo zigbuild --release $FEATURE_FLAGS \
            --target ${{ matrix.zig_target }} \
            --bin mediafusion-api \
            --bin mediafusion-worker

      - name: Build release binaries (native)
        if: ${{ !matrix.use_zigbuild }}
        env:
          SQLX_OFFLINE: "true"
        run: |
          cd backend
          [ -n "${{ matrix.openssl_include_dir }}" ] && export OPENSSL_INCLUDE_DIR="${{ matrix.openssl_include_dir }}"
          [ -n "${{ matrix.openssl_lib_dir }}" ] && export OPENSSL_LIB_DIR="${{ matrix.openssl_lib_dir }}"
          FEATURES="${{ matrix.tls_features }}"
          if [ "${{ matrix.nsfw }}" = "true" ]; then
            FEATURES="$FEATURES,nsfw-classifier"
          fi
          if [ "${{ matrix.jemalloc }}" != "true" ]; then
            FEATURE_FLAGS="--no-default-features --features $FEATURES"
          else
            FEATURE_FLAGS="--features $FEATURES"
          fi
          cargo build --release $FEATURE_FLAGS \
            --target ${{ matrix.rust_target }} \
            --bin mediafusion-api \
            --bin mediafusion-worker

      - name: Stage artifacts
        run: |
          PLATFORM=${{ matrix.platform }}
          ARCH=${{ matrix.arch }}
          TARGET=${{ matrix.rust_target }}
          SUFFIX=${{ matrix.exe_suffix }}
          mkdir -p dist
          cp "backend/target/$TARGET/release/mediafusion-api${SUFFIX}" \
            "dist/mediafusion-api-${PLATFORM}-${ARCH}${SUFFIX}"
          cp "backend/target/$TARGET/release/mediafusion-worker${SUFFIX}" \
            "dist/mediafusion-worker-${PLATFORM}-${ARCH}${SUFFIX}"
          if [ -z "$SUFFIX" ]; then
            chmod +x dist/*
          fi

      - name: Upload binaries artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rust-dist-${{ matrix.label }}
          path: dist/
          retention-days: 1

  upload_release_assets:
    name: Upload Binary Release Assets
    needs: rust-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all release binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: rust-dist-*
          path: dist/
          merge-multiple: true

      - name: Upload binaries to GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

  mediafusion_docker_build:
    needs: [update_version, rust-build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Download linux amd64 binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rust-dist-linux-amd64
          path: rust-dist/amd64/

      - name: Download linux arm64 binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rust-dist-linux-arm64
          path: rust-dist/arm64/

      - name: Rename artifacts to match Dockerfile expectations
        run: |
          mv rust-dist/amd64/mediafusion-api-linux-amd64    rust-dist/amd64/mediafusion-api
          mv rust-dist/amd64/mediafusion-worker-linux-amd64 rust-dist/amd64/mediafusion-worker
          mv rust-dist/arm64/mediafusion-api-linux-arm64    rust-dist/arm64/mediafusion-api
          mv rust-dist/arm64/mediafusion-worker-linux-arm64 rust-dist/arm64/mediafusion-worker
          chmod +x rust-dist/amd64/* rust-dist/arm64/*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: docker_build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          file: ./deployment/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=mediafusion
          cache-to: type=gha,mode=max,scope=mediafusion
          build-args: VERSION=${{ env.RELEASE_VERSION }}
          tags: |
            mhdzumair/mediafusion:${{ env.RELEASE_VERSION }}
            mhdzumair/mediafusion:${{ contains(env.RELEASE_VERSION, 'beta') && 'beta' || 'latest' }}

      - name: Image digest
        run: echo "${{ steps.docker_build.outputs.digest }}"

  kodi_build:
    needs: update_version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Install required packages
        run: sudo apt-get install -y zip xmlstarlet

      - name: Build addon and repository
        run: |
          make -C clients/kodi
          for file in clients/kodi/dist/plugin.video.mediafusion/plugin.video.mediafusion-*.zip clients/kodi/dist/repository.mediafusion/repository.mediafusion-*.zip; do
            if [ ! -f "$file" ]; then
              echo "Error: Build artifact $file not found"
              exit 1
            fi
          done

      - name: Deploy to GitHub Pages
        if: "!github.event.release.prerelease"
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: clients/kodi/dist
          enable_jekyll: false
          keep_files: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          files: |
            clients/kodi/dist/plugin.video.mediafusion/plugin.video.mediafusion-*.zip
          token: ${{ secrets.GITHUB_TOKEN }}

  generate_release_notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Extract previous version
        id: extract_prev
        run: |
          BODY=$(cat << 'EOF'
          ${{ github.event.release.body }}
          EOF
          )
          PREVIOUS_VERSION=$(echo "$BODY" | grep -o '/compare/.*\.\.\.' | sed 's/\/compare\///' | sed 's/\.\.\.//' || true)
          echo "PREVIOUS_VERSION=${PREVIOUS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          make generate-notes VERSION_OLD=${{ steps.extract_prev.outputs.PREVIOUS_VERSION }} VERSION_NEW=${{ env.RELEASE_VERSION }} > release_notes.md

      - name: Update Release Notes
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          body_path: release_notes.md
          token: ${{ secrets.GITHUB_TOKEN }}
