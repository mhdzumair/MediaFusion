global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: mediafusion
    static_configs:
      - targets: ["mediafusion-api:8000"]
    metrics_path: /api/v1/metrics
    authorization:
      credentials: "${PROMETHEUS_METRICS_TOKEN}"

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
